<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Di Di Coffee - Đổi Thưởng</title>
    <link rel="stylesheet" href="style.css">
    <script src="config.js"></script> 
    <style>
        /* --- GIỮ NGUYÊN STYLE 30/04 VÀ HIỆU ỨNG LẤP LÁNH --- */
        body::after {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: -1;
            background-image: 
                radial-gradient(1px 1px at 25px 35px, white, rgba(255, 255, 255, 0)),
                radial-gradient(1.5px 1.5px at 150px 150px, yellow, rgba(255, 255, 0, 0));
            background-size: 200px 200px;
            animation: twinkling 4s infinite alternate ease-in-out;
        }
        @keyframes twinkling { 0% { opacity: 0.3; } 50% { opacity: 0.8; } 100% { opacity: 0.3; } }
        body { background-color: #da251d !important; background-image: radial-gradient(circle, #ff0000 0%, #750000 100%) !important; margin: 0; padding: 0; font-family: sans-serif; position: relative; }
        
        .card { border: 1px solid #ffde00 !important; background-color: rgba(255, 255, 255, 0.9) !important; backdrop-filter: blur(5px); margin: 20px auto; max-width: 400px; padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 10; position: relative; }
        #shopTitle { color: #da251d !important; text-align: center; }

        /* BĂNG RÔN 30/04 */
        .banner-corner { position: fixed; top: 0; width: 250px; height: 60px; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #ffde00; text-shadow: 1px 1px 3px rgba(0,0,0,0.5); border-radius: 40px; border: 2px solid #ffde00; }
        .banner-left { left: -60px; top: 25px; background: linear-gradient(135deg, #a50000 0%, #da251d 100%); transform: rotate(-30deg); }
        .banner-right { right: -60px; top: 25px; background: linear-gradient(-135deg, #a50000 0%, #da251d 100%); transform: rotate(30deg); }
        .banner-date { font-size: 18px; font-weight: 900; margin: 0; }
        .banner-text { font-size: 9px; text-transform: uppercase; margin: 0; color: #fff; }
        
        #btnRedeem { background: linear-gradient(135deg, #da251d 0%, #ffde00 100%) !important; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; width: 100%; margin-top: 10px; cursor: pointer; }
        #btnRedeem:disabled { background: #ccc !important; }
        input[type="tel"] { width: 94%; padding: 10px; border-radius: 5px; border: 1px solid #ccc; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="banner-corner banner-left"><p class="banner-date">30/04/1975</p><p class="banner-text">Giải phóng Miền Nam</p></div>
<div class="banner-corner banner-right"><p class="banner-date">30/04/2026</p><p class="banner-text">Kỷ niệm 51 năm</p></div>

<div class="card"> 
    <h2 id="shopTitle">☕ DI DI COFFEE</h2>
    <p style="color: #8d6e63; text-align: center;">Đổi <span id="reqPoints">...</span> điểm = 1 phần quà</p>
    
    <div id="pointDisplay"></div> 
    <div id="form-input">
        <label>Số điện thoại:</label>
        <input type="tel" id="phone" placeholder="Nhập số điện thoại" oninput="checkPointRealtime()">
        <button id="btnRedeem" onclick="handleRedeem()" disabled>XÁC NHẬN ĐỔI QUÀ</button>
    </div>
    <div id="status"></div>
</div>

<script>
    // --- BẢNG TRA CỨU MÃ MÓN (Ông sửa mã 2 ký tự ở đây) ---
    const giftMap = {
        "CF": "Ly Cafe tùy chọn",
        "DI": "1 ly CF",
        "CM": "Ly Cafe Muối",
        "TX": "Ly Trà Xanh"
    };
    const monMacDinh = "Phần quà may mắn";

    const scriptURL = CONFIG.SCRIPT_URL;
    const minPoints = CONFIG.REDEEM_POINTS;
    let isProcessing = false; 
    let currentGiftName = monMacDinh;

    document.getElementById('reqPoints').innerText = minPoints;

    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        const phoneFromUrl = urlParams.get('phone');
        const savedPhone = localStorage.getItem('didi_customer_phone');
        const finalPhone = phoneFromUrl || savedPhone;
        
        if (finalPhone) {
            document.getElementById('phone').value = finalPhone;
            autoProcess(finalPhone);
        }
    };

    async function autoProcess(phone) {
        const display = document.getElementById('pointDisplay');
        display.innerHTML = "<div style='text-align:center;'>⏳ Đang kiểm tra...</div>";
        isProcessing = true;
        
        try {
            const res = await fetch(`${scriptURL}?action=get_points&phone=${phone}`);
            const rawData = await res.text();
            
            let points = 0, name = "bạn", code = "";

            try {
                const data = JSON.parse(rawData);
                points = parseFloat(data.points) || 0;
                name = data.name || "bạn";
                code = data.suggested_code || ""; // Lấy mã 2 ký tự
            } catch(e) {
                points = parseFloat(rawData) || 0;
            }

            // Suy luận món quà từ mã trả về
            currentGiftName = giftMap[code.toUpperCase()] || monMacDinh;

            display.innerHTML = `
                <div style='text-align:center; margin-bottom:15px;'>
                    Chào <b>${name}</b>! Bạn có: <strong>${points}</strong> điểm<br>
                    <span style="color:#da251d; font-weight:bold;">🎁 Gợi ý: ${currentGiftName}</span>
                </div>`;

            if (points >= minPoints) {
                handleRedeem(); // Tự động đổi nếu đủ điểm
            } else {
                document.getElementById('btnRedeem').innerText = "CHƯA ĐỦ ĐIỂM";
                isProcessing = false;
            }
        } catch (err) {
            display.innerHTML = "<div style='color:red;'>❌ Lỗi kết nối</div>";
            isProcessing = false;
        }
    }

    function checkPointRealtime() {
        if (isProcessing) return;
        const phone = document.getElementById('phone').value.trim();
        if (phone.length >= 10) {
            fetch(`${scriptURL}?action=get_points&phone=${phone}`)
                .then(res => res.text())
                .then(rawData => {
                    try {
                        const data = JSON.parse(rawData);
                        let cp = parseFloat(data.points) || 0;
                        let code = data.suggested_code || "";
                        currentGiftName = giftMap[code.toUpperCase()] || monMacDinh;
                        
                        document.getElementById('pointDisplay').innerHTML = `
                            <div style='text-align:center;'>
                                Có: <strong>${cp}</strong> điểm. Quà: ${currentGiftName}
                            </div>`;
                        document.getElementById('btnRedeem').disabled = cp < minPoints;
                    } catch(e) {
                        let cp = parseFloat(rawData) || 0;
                        document.getElementById('pointDisplay').innerHTML = `<div style='text-align:center;'>Có: <strong>${cp}</strong> điểm</div>`;
                        document.getElementById('btnRedeem').disabled = cp < minPoints;
                    }
                });
        }
    }

    function handleRedeem() {
        const phone = document.getElementById('phone').value.trim();
        const statusDiv = document.getElementById('status');
        const btn = document.getElementById('btnRedeem');

        isProcessing = true;
        btn.disabled = true;
        btn.innerText = "⏳ ĐANG XỬ LÝ...";

        fetch(`${scriptURL}?action=doi_thuong&phone=${phone}&gift=${encodeURIComponent(currentGiftName)}&points=${minPoints}`)
        .then(res => res.text())
        .then(result => {
            if (result === "SUCCESS") {
                document.getElementById('form-input').style.display = "none";
                document.getElementById('pointDisplay').style.display = "none";
                statusDiv.innerHTML = `
                    <div style="background:#f0f9eb; padding:20px; border-radius:10px; text-align:center; border:2px solid #67c23a;">
                        <h3 style="color:#67c23a; margin-top:0;">✅ ĐỔI THÀNH CÔNG!</h3>
                        <p>Món quà của bạn: <br><b style="font-size:1.2em;">${currentGiftName}</b></p>
                    </div>
                    <button onclick="location.reload()" style="width:100%; margin-top:15px; padding:12px; cursor:pointer;">TIẾP TỤC</button>
                `;
                localStorage.setItem('didi_customer_phone', phone);
            } else {
                statusDiv.innerHTML = `<p style='color:red; text-align:center;'>❌ Lỗi: ${result}</p>`;
                isProcessing = false;
                btn.disabled = false;
            }
        });
    }
</script>
</body>
</html>
