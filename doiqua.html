<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Di Di Coffee - Đổi Thưởng</title>
    <link rel="stylesheet" href="style.css">
    <script src="config.js"></script> 
    <style>
        body::after {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: -1;
            background-image: 
                radial-gradient(1px 1px at 25px 35px, white, rgba(255, 255, 255, 0)),
                radial-gradient(1.5px 1.5px at 60px 80px, white, rgba(255, 255, 255, 0)),
                radial-gradient(1px 1px at 150px 150px, yellow, rgba(255, 255, 0, 0));
            background-size: 200px 200px;
            animation: twinkling 4s infinite alternate ease-in-out;
        }
        @keyframes twinkling { 0% { opacity: 0.3; transform: scale(1); } 100% { opacity: 0.8; transform: scale(1.02); } }
        body { background-color: #da251d !important; background-image: radial-gradient(circle, #ff0000 0%, #750000 100%) !important; margin: 0; overflow-x: hidden; }
        .card { border: 1px solid #ffde00 !important; box-shadow: 0 10px 30px rgba(0,0,0,0.5) !important; background-color: rgba(255, 255, 255, 0.7) !important; backdrop-filter: blur(5px); z-index: 10; margin: 20px auto; max-width: 400px; padding: 20px; border-radius: 15px; }
        #shopTitle { color: #da251d !important; text-align: center; }
        #btnRedeem { background: linear-gradient(135deg, #da251d 0%, #ffde00 100%) !important; color: #fff !important; font-weight: bold; border: none; padding: 12px; border-radius: 5px; cursor: pointer; animation: pulse-button 2s infinite; }
        @keyframes pulse-button { 0% { box-shadow: 0 0 0 0 rgba(218, 37, 29, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(218, 37, 29, 0); } }
        
        .banner-corner { position: fixed; top: 25px; width: 250px; height: 60px; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #ffde00; text-align: center; font-family: 'Arial Black', sans-serif; border-radius: 40px; border: 2px solid #ffde00; }
        .banner-left { left: -60px; background: linear-gradient(135deg, #a50000 0%, #da251d 100%); transform: rotate(-30deg); }
        .banner-right { right: -60px; background: linear-gradient(-135deg, #a50000 0%, #da251d 100%); transform: rotate(30deg); }
        .success-box { background: white; padding: 20px; border-radius: 10px; text-align: center; border: 3px solid #ffde00; }
    </style>
</head>
<body>
    <div class="banner-corner banner-left">
        <p style="margin:0; font-size:18px;">30/04/1975</p>
        <p style="margin:0; font-size:9px; color:white;">GIẢI PHÓNG MIỀN NAM</p>
    </div>
    <div class="banner-corner banner-right">
        <p style="margin:0; font-size:18px;">30/04/2026</p>
        <p style="margin:0; font-size:9px; color:white;">KỶ NIỆM 51 NĂM</p>
    </div>

    <div class="card"> 
        <h2 id="shopTitle">☕ DI DI COFFEE</h2>
        <p style="color: #8d6e63; text-align: center;">Đổi <span id="reqPoints">...</span> điểm = 1 ly miễn phí</p>
        <div id="pointDisplay"></div> 
        <div id="form-input">
            <label>Số điện thoại:</label>
            <input type="tel" id="phone" placeholder="Nhập số điện thoại" oninput="checkPointRealtime()" style="width:100%; padding:10px; margin:10px 0;">
            <button id="btnRedeem" onclick="handleRedeem()" disabled style="width: 100%;">XÁC NHẬN ĐỔI QUÀ</button>
        </div>
        <div id="status"></div>
    </div>

<script>
    const scriptURL = CONFIG.SCRIPT_URL;
    const minPoints = CONFIG.REDEEM_POINTS;
    let isProcessing = false;
    document.getElementById('reqPoints').innerText = minPoints;

    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        const fromWeb = urlParams.get('from') === 'webs';
        const phoneFromUrl = urlParams.get('phone');
        const savedPhone = localStorage.getItem('didi_customer_phone') || localStorage.getItem('userPhone');
        
        if (fromWeb) {
            document.getElementById('form-input').style.display = "none";
            document.getElementById('status').innerHTML = "<div class='success-box'>⚠️ Vui lòng quét mã QR tại quầy để đổi quà.</div>";
            return; 
        }

        const finalPhone = phoneFromUrl || savedPhone;
        if (finalPhone) {
            document.getElementById('phone').value = finalPhone;
            autoProcess(finalPhone);
        }
    };

    async function autoProcess(phone) {
        isProcessing = true;
        const display = document.getElementById('pointDisplay');
        display.innerHTML = "⏳ Đang kiểm tra điểm...";
        try {
            const res = await fetch(`${scriptURL}?action=get_points&phone=${phone}`);
            const data = await res.json();
            let currentPoints = parseFloat(data.points) || 0;
            display.innerHTML = `<div style='text-align:center;'>Chào <b>${data.name}</b>! Bạn có: <b>${currentPoints}</b> điểm</div>`;

            if (currentPoints >= minPoints) {
                handleRedeem();
            } else {
                isProcessing = false;
                document.getElementById('btnRedeem').innerText = "CHƯA ĐỦ ĐIỂM";
            }
        } catch (e) { isProcessing = false; }
    }

    function checkPointRealtime() {
        if (isProcessing) return;
        const phone = document.getElementById('phone').value.trim();
        const btn = document.getElementById('btnRedeem');
        if (phone.length >= 10) {
            fetch(`${scriptURL}?action=get_points&phone=${phone}`)
                .then(res => res.json())
                .then(data => {
                    let cp = parseFloat(data.points) || 0;
                    document.getElementById('pointDisplay').innerHTML = `Hiện có: <strong>${cp}</strong> điểm`;
                    btn.disabled = cp < minPoints;
                    btn.innerText = cp < minPoints ? "CHƯA ĐỦ ĐIỂM" : "XÁC NHẬN ĐỔI QUÀ";
                });
        }
    }

    function handleRedeem() {
        const phone = document.getElementById('phone').value.trim();
        const statusDiv = document.getElementById('status');
        const btn = document.getElementById('btnRedeem');
        
        isProcessing = true;
        btn.disabled = true;
        btn.innerText = "⏳ ĐANG XỬ LÝ...";

        fetch(`${scriptURL}?action=doi_thuong&phone=${phone}&points=${minPoints}`)
        .then(res => res.json())
        .then(result => {
            if (result.status === "SUCCESS") {
                const now = new Date();
                statusDiv.innerHTML = `
                    <div class="success-box">
                        <div style="color: #da251d; font-size: 20px; font-weight: bold;">✅ ĐỔI THÀNH CÔNG!</div>
                        <div style="margin: 15px 0;">
                            Quà tặng: <br>
                            <strong style="font-size: 24px; color: #da251d;">${result.gift_name.toUpperCase()}</strong>
                        </div>
                        <p style="font-size:12px; color:#666;">Thời gian: ${now.toLocaleString('vi-VN')}</p>
                        <button onclick="location.reload()" style="background:#8d6e63; color:white; border:none; padding:10px; border-radius:5px; width:100%;">TIẾP TỤC</button>
                    </div>
                `;
                document.getElementById('form-input').style.display = "none";
                document.getElementById('pointDisplay').style.display = "none";
            } else {
                alert("Lỗi: " + result.status);
                isProcessing = false;
                btn.disabled = false;
            }
        });
    }
</script>
</body>
</html>
