<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Di Di Coffee - Đổi Thưởng</title>
    <link rel="stylesheet" href="style.css">
    <script src="config.js"></script> 
     <style>
        /* PHẦN CẬP NHẬT GIAO DIỆN: THÊM NGÔI SAO LẤP LÁNH */

        /* 1. Tạo lớp nền lấp lánh (phía trên body) */
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            
            background-image: 
                radial-gradient(1px 1px at 25px 35px, white, rgba(255, 255, 255, 0)),
                radial-gradient(1.5px 1.5px at 60px 80px, white, rgba(255, 255, 255, 0)),
                radial-gradient(1px 1px at 125px 20px, white, rgba(255, 255, 255, 0)),
                radial-gradient(1px 1px at 150px 150px, yellow, rgba(255, 255, 0, 0)),
                radial-gradient(1.5px 1.5px at 190px 70px, rgba(255, 255, 255, 0.7), rgba(255, 255, 255, 0));
            background-size: 200px 200px;
            
            animation: twinkling 4s infinite alternate ease-in-out;
        }

        @keyframes twinkling {
            0% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.02); }
            100% { opacity: 0.3; transform: scale(1); }
        }

        #btnSubmit {
            animation: pulse-button 2s infinite;
        }

        @keyframes pulse-button {
            0% { box-shadow: 0 0 0 0 rgba(218, 37, 29, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(218, 37, 29, 0); }
            100% { box-shadow: 0 0 0 0 rgba(218, 37, 29, 0); }
        }

        body {
            background-color: #da251d !important; 
            background-image: radial-gradient(circle, #ff0000 0%, #750000 100%) !important;
            position: relative;
            overflow-x: hidden;
            margin: 0;
            padding: 0;
        }

        body::before {
            content: "★";
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 80vw;
            color: rgba(255, 255, 0, 0.15);
            z-index: -1;
            font-family: Arial, sans-serif;
        }

        .card {
            border: 1px solid #ffde00 !important;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5) !important;
            background-color: rgba(255, 255, 255, 0.5) !important; 
            backdrop-filter: blur(5px);
            z-index: 10;
        }

        #shopTitle {
            color: #da251d !important;
        }

        #btnSubmit {
            background: linear-gradient(135deg, #da251d 0%, #ffde00 100%) !important;
            color: #fff !important;
            font-weight: bold;
            border: none;
            box-shadow: 0 4px 15px rgba(218, 37, 29, 0.4);
        }

        /* --- PHẦN CẬP NHẬT: BĂNG RÔN VÀ NGÔI SAO --- */
        .banner-corner {
            position: fixed;
            top: 0;
            width: 250px;
            height: 60px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #ffde00;
            text-align: center;
            font-family: 'Arial Black', sans-serif;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            border-radius: 40px; 
        }

        /* Tạo ngôi sao vàng dưới băng rôn */
        .banner-corner::after {
            content: "★";
            position: absolute;
            bottom: -35px; /* Vị trí dưới băng rôn */
            font-size: 30px;
            color: #ffde00;
            text-shadow: 0 0 10px rgba(255, 222, 0, 0.8);
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.5));
        }

        .banner-left {
            left: -60px;
            top: 25px;
            background: linear-gradient(135deg, #a50000 0%, #da251d 100%);
            transform: rotate(-30deg);
            border: 2px solid #ffde00;
        }

        /* Chỉnh ngôi sao bên trái lệch một chút cho cân đối theo độ xoay */
        .banner-left::after {
            right: 108px;
        }

        .banner-right {
            right: -60px;
            top: 25px;
            background: linear-gradient(-135deg, #a50000 0%, #da251d 100%);
            transform: rotate(30deg);
            border: 2px solid #ffde00;
        }

        /* Chỉnh ngôi sao bên phải lệch một chút cho cân đối theo độ xoay */
        .banner-right::after {
            left: 108px;
        }

        .banner-date {
            font-size: 18px;
            font-weight: 900;
            margin: 0;
            line-height: 1;
        }

        .banner-text {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 2px 0 0 0;
            color: #fff;
            font-weight: bold;
        }

        @media (max-width: 400px) {
            .banner-corner {
                width: 200px;
                height: 50px;
            }
            .banner-date { font-size: 14px; }
            .banner-text { font-size: 8px; }
            .banner-left { left: -50px; }
            .banner-right { right: -50px; }
            .banner-corner::after { font-size: 24px; bottom: -30px; }
        }
        /* --- PHẦN CẬP NHẬT: NGÔI SAO ĐỨNG THẲNG --- */
        .banner-corner::after {
            content: "★";
            position: absolute;
            bottom: -35px;
            font-size: 30px;
            color: #ffde00;
            text-shadow: 0 0 10px rgba(255, 222, 0, 0.8);
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.5));
            /* Mặc định cho ngôi sao đứng thẳng */
            display: block; 
        }

        .banner-left::after {
            right: 108px;
            /* Băng rôn xoay -30deg thì ta xoay ngược lại 30deg để ngôi sao đứng thẳng */
            transform: rotate(30deg); 
        }

        .banner-right::after {
            left: 108px;
            /* Băng rôn xoay 30deg thì ta xoay ngược lại -30deg để ngôi sao đứng thẳng */
            transform: rotate(-30deg);
        }
    </style>
</head>
<body>
    <div class="banner-corner banner-left">
        <p style="margin:0; font-size:18px;">30/04/1975</p>
        <p style="margin:0; font-size:9px; color:white;">GIẢI PHÓNG MIỀN NAM</p>
    </div>
    <div class="banner-corner banner-right">
        <p style="margin:0; font-size:18px;">30/04/2026</p>
        <p style="margin:0; font-size:9px; color:white;">KỶ NIỆM 51 NĂM</p>
    </div>

    <div class="card"> 
        <h2 id="shopTitle">☕ DI DI COFFEE</h2>
        <p style="color: #8d6e63; text-align: center;">Đổi <span id="reqPoints">...</span> điểm = 1 ly miễn phí</p>
        <div id="pointDisplay"></div> 
        <div id="form-input">
            <label>Số điện thoại:</label>
            <input type="tel" id="phone" placeholder="Nhập số điện thoại" oninput="checkPointRealtime()" style="width:100%; padding:10px; margin:10px 0;">
            <button id="btnRedeem" onclick="handleRedeem()" disabled style="width: 100%;">XÁC NHẬN ĐỔI QUÀ</button>
        </div>
        <div id="status"></div>
    </div>

<script>
    const scriptURL = CONFIG.SCRIPT_URL;
    const minPoints = CONFIG.REDEEM_POINTS;
    let isProcessing = false;
    document.getElementById('reqPoints').innerText = minPoints;

    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        const fromWeb = urlParams.get('from') === 'webs';
        const phoneFromUrl = urlParams.get('phone');
        const savedPhone = localStorage.getItem('didi_customer_phone') || localStorage.getItem('userPhone');
        
        if (fromWeb) {
            document.getElementById('form-input').style.display = "none";
            document.getElementById('status').innerHTML = "<div class='success-box'>⚠️ Vui lòng quét mã QR tại quầy để đổi quà.</div>";
            return; 
        }

        const finalPhone = phoneFromUrl || savedPhone;
        if (finalPhone) {
            document.getElementById('phone').value = finalPhone;
            autoProcess(finalPhone);
        }
    };

    async function autoProcess(phone) {
        isProcessing = true;
        const display = document.getElementById('pointDisplay');
        display.innerHTML = "⏳ Đang kiểm tra điểm...</br></br>";
        try {
            // Thêm callback=JSON_CALLBACK để Script trả về đúng định dạng
            const res = await fetch(`${scriptURL}?action=get_points_new&phone=${phone}`);
            const data = await res.json(); 
            
            // Xử lý nếu data trả về là đối tượng JSON
            let currentPoints = parseFloat(data.points) || 0;
            let customerName = data.name || "Khách hàng";
            
            display.innerHTML = `<div style='text-align:center;'>Chào <b>${customerName}</b>! Bạn có: <b>${currentPoints}</b> điểm</div></br>`;

            if (currentPoints >= minPoints) {
                handleRedeem();
            } else {
                isProcessing = false;
                document.getElementById('btnRedeem').innerText = "CHƯA ĐỦ ĐIỂM";
            }
        } catch (e) { 
            console.error(e);
            display.innerHTML = "❌ Không tìm thấy thông tin";
            isProcessing = false; 
        }
    }

    function checkPointRealtime() {
        if (isProcessing) return;
        const phone = document.getElementById('phone').value.trim();
        const btn = document.getElementById('btnRedeem');
        const display = document.getElementById('pointDisplay');

        if (phone.length >= 10) {
            fetch(`${scriptURL}?action=get_points_new&phone=${phone}`)
                .then(res => res.json())
                .then(data => {
                    let cp = parseFloat(data.points) || 0;
                    let name = data.name || "Khách hàng";
                    display.innerHTML = `<div style='text-align:center;'>Chào <b>${name}</b>! Bạn có: <b>${cp}</b> điểm</div>`;
                    
                    btn.disabled = cp < minPoints;
                    btn.innerText = cp < minPoints ? "CHƯA ĐỦ ĐIỂM" : "ĐANG KIỂM TRA";
                })
                .catch(err => {
                    display.innerHTML = "SĐT chưa có điểm tích lũy";
                });
        }
    }

    function handleRedeem() {
        const phone = document.getElementById('phone').value.trim();
        const statusDiv = document.getElementById('status');
        const btn = document.getElementById('btnRedeem');
        
        isProcessing = true;
        btn.disabled = true;
        btn.innerText = "⏳ ĐANG XỬ LÝ...";

        fetch(`${scriptURL}?action=doi_thuong&phone=${phone}&points=${minPoints}`)
        .then(res => res.json())
        .then(result => {
            if (result.status === "SUCCESS") {
                const now = new Date();
                
                statusDiv.innerHTML = `
                    <div class="success-box">
                        <div >✅ ĐỔI THÀNH CÔNG!</div>
                        <div style="margin: 15px 0;">
                            <strong style="font-size: 18px; color: #da251d;">${result.gift_name.toUpperCase()}</strong>
                        </div>
                        <span class="time">Thời gian: ${now.toLocaleString('vi-VN')}</span>
                        <button class="btn-confirm" onclick="window.location.href='doi-qua.html'">TIẾP TỤC ĐỔI</button>
                    </div>
                `;
                document.getElementById('form-input').style.display = "none";
                document.getElementById('pointDisplay').style.display = "none";
            } else {
                alert("Lỗi: " + result.status);
                isProcessing = false;
                btn.disabled = false;
            }
        });
    }
</script>
</body>
</html>
